<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sovereign Domain: 1 Pedro 3</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=Lora:ital,wght@0,400;1,400&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="tech-dark">
    <div id="app">
        <aside id="leaderboard-sidebar">
            <div class="sidebar-header">
                <h2>Leaderboard</h2>
                <div class="system-status">SYSTEM ACTIVE</div>
            </div>
            <div class="team-container team-a">
                <div class="team-info">
                    <span class="team-tag">TEAM ALPHA</span>
                    <span id="score-a" class="team-score">0000</span>
                </div>
                <div class="power-bar"><div id="power-a" class="power-level" style="width: 0%;"></div></div>
            </div>
            <div class="team-container team-b">
                <div class="team-info">
                    <span class="team-tag">TEAM BRAVO</span>
                    <span id="score-b" class="team-score">0000</span>
                </div>
                <div class="power-bar"><div id="power-b" class="power-level" style="width: 0%;"></div></div>
            </div>
            <div class="conquest-summary">
                <h3>Nodes Captured</h3>
                <div id="node-stats">0 / 6</div>
            </div>
        </aside>

        <main id="command-center">
            <header class="main-header">
                <h1>The Sovereign Domain</h1>
                <div class="session-info">1 PEDRO 3:8-22 // HACKING BIBLE CONTEXT</div>
            </header>

            <div id="sovereign-map">
                <svg id="map-svg" viewBox="0 0 800 500">
                    <!-- Connection lines will be injected here -->
                    <g id="map-lines"></g>
                    <!-- Nodes will be injected here -->
                    <g id="map-nodes"></g>
                </svg>
            </div>

            <footer class="action-bar">
                <div id="current-action-label">Ready for Assault...</div>
            </footer>
        </main>

        <!-- Dynamic Overlays -->
        <div id="overlay" class="hidden">
            <!-- Concept Modal (Assault/Consolidation/Hack) -->
            <div id="action-modal" class="glass-card">
                <div id="modal-type-indicator">ASSAULT</div>
                <div id="modal-verse">NODE // 1 PEDRO 3:8-9</div>
                <div id="modal-question" class="tech-text"></div>
                <div id="modal-controls">
                    <!-- Dynamically injected buttons -->
                </div>
            </div>

            <!-- Reading Mode Overlay -->
            <div id="reading-mode" class="hidden">
                <div class="reading-header">
                    <div class="icon">📖</div>
                    <h3>Sovereign Commentary</h3>
                </div>
                <div id="reading-content" class="serif-text"></div>
                <button id="close-reading" class="btn-tech">Acknowledge Explanation</button>
            </div>
        </div>

        <div id="admin-panel">
            <button id="btn-reset" title="Full System Reset">⟳</button>
        </div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
