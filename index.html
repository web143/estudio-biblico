<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estudio Bíblico — 1 Juan 2</title>
<script>if('serviceWorker'in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js').catch(()=>{});});}</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif;background:#FDFBF7;min-height:100vh;overflow-x:hidden;color:#1f2937;line-height:1.5}
:root{--ease-bounce:cubic-bezier(0.175,0.885,0.32,1.275);--ease-out:cubic-bezier(0.22,1,0.36,1);--violet:#7C3AED;--violet-bg:#f5f3ff;--violet-border:#c4b5fd;--emerald:#059669;--emerald-bg:#ecfdf5;--emerald-border:#6ee7b7;--amber:#F59E0B;--amber-bg:#fffbeb;--amber-border:#fcd34d;--rose:#ef4444;--rose-bg:#fef2f2;--success:#10b981;--success-bg:#ecfdf5;--gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-300:#d1d5db;--gray-400:#9ca3af;--gray-500:#6b7280;--gray-600:#4b5563;--gray-700:#374151;--gray-800:#1f2937;--gray-900:#111827}
.hidden{display:none!important}
.screen{min-height:100vh;display:flex;flex-direction:column}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes scorePop{0%{transform:scale(1)}40%{transform:scale(1.35)}100%{transform:scale(1)}}
@keyframes pulseGold{0%,100%{box-shadow:0 0 20px rgba(245,158,11,0.3),0 0 60px rgba(245,158,11,0.15)}50%{box-shadow:0 0 40px rgba(245,158,11,0.5),0 0 80px rgba(245,158,11,0.25)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes optPop{to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.score-pop{animation:scorePop .35s var(--ease-bounce)}

/* ═══ WELCOME ═══ */
.welcome-screen{align-items:center;justify-content:center;padding:32px 20px;position:relative;overflow:hidden;min-height:100vh;gap:0}
.welcome-screen::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(124,58,237,0.07),transparent 70%);top:-120px;left:-120px;pointer-events:none}
.welcome-screen::after{content:'';position:absolute;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,rgba(5,150,105,0.06),transparent 70%);bottom:-100px;right:-100px;pointer-events:none}
.welcome-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:28px;width:100%;max-width:460px}
.welcome-logo{display:flex;flex-direction:column;align-items:center;gap:8px;animation:fadeDown .6s var(--ease-out) both}
.welcome-emoji{font-size:3.5rem;filter:drop-shadow(0 8px 16px rgba(124,58,237,0.2));animation:float 3s ease-in-out infinite}
.welcome-title{font-size:2rem;font-weight:900;color:var(--gray-900);letter-spacing:-.5px;text-align:center}
.welcome-title span{color:var(--violet)}
.welcome-sub{font-size:.8rem;font-weight:700;color:var(--gray-400);letter-spacing:1px;text-align:center}
.teams-row{display:flex;gap:12px;width:100%;animation:fadeUp .6s .15s var(--ease-out) both}
.team-card{flex:1;background:#fff;border-radius:1.5rem;padding:20px 16px;box-shadow:0 4px 20px rgba(0,0,0,0.06);border:2px solid var(--gray-100);display:flex;flex-direction:column;align-items:center;gap:10px;transition:border-color .2s,box-shadow .2s}
.team-card:focus-within{border-color:var(--violet);box-shadow:0 4px 24px rgba(124,58,237,0.1)}
.team-card.card-b:focus-within{border-color:var(--emerald);box-shadow:0 4px 24px rgba(5,150,105,0.1)}
.card-avatar{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;font-size:1.3rem}
.card-a .card-avatar{background:var(--violet-bg)}
.card-b .card-avatar{background:var(--emerald-bg)}
.card-label{font-size:.65rem;font-weight:800;letter-spacing:2px;text-transform:uppercase}
.card-a .card-label{color:var(--violet)}
.card-b .card-label{color:var(--emerald)}
.team-input{width:100%;padding:10px 14px;border-radius:.9rem;border:2px solid var(--gray-200);background:var(--gray-50);font-family:inherit;font-size:.9rem;font-weight:700;color:var(--gray-800);text-align:center;outline:none;transition:border-color .2s}
.team-input::placeholder{color:var(--gray-300);font-weight:600}
.card-a .team-input:focus{border-color:var(--violet);box-shadow:0 0 0 3px rgba(124,58,237,0.1)}
.card-b .team-input:focus{border-color:var(--emerald);box-shadow:0 0 0 3px rgba(5,150,105,0.1)}
.btn-start{width:100%;padding:16px;border:none;border-radius:1.5rem;background:linear-gradient(135deg,var(--violet),#6D28D9);color:#fff;font-family:inherit;font-size:1rem;font-weight:900;letter-spacing:.3px;cursor:pointer;box-shadow:0 8px 24px rgba(124,58,237,0.25);transition:all .25s var(--ease-bounce);display:flex;align-items:center;justify-content:center;gap:10px;animation:fadeUp .6s .3s var(--ease-out) both}
.btn-start:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 14px 32px rgba(124,58,237,0.3)}
.btn-start:active{transform:scale(.97)}
.welcome-footnote{font-size:.7rem;font-weight:700;color:var(--gray-400);text-align:center;animation:fadeUp .6s .4s var(--ease-out) both}

/* ═══ SCOREBOARD ═══ */
.scoreboard{position:sticky;top:0;z-index:30;background:#FDFBF7/95;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid rgba(0,0,0,.05);padding:10px 16px}
.scoreboard-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;gap:8px}
.team-panel{flex:1;display:flex;flex-wrap:wrap;align-items:center;gap:6px;padding:8px 12px;border-radius:1.2rem;transition:all .3s;border:2px solid transparent}
.team-panel.active-a{border-color:var(--violet-border);background:var(--violet-bg)}
.team-panel.active-b{border-color:var(--emerald-border);background:var(--emerald-bg)}
.team-panel.inactive{background:rgba(255,255,255,.6);border-color:transparent}
.team-label{font-size:.7rem;font-weight:800;color:var(--gray-500);text-transform:uppercase;letter-spacing:1px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:1}
.team-dot{width:8px;height:8px;border-radius:50%;display:none;flex-shrink:0}
.team-dot.dot-a{background:var(--violet);box-shadow:0 0 8px rgba(124,58,237,.5)}
.team-dot.dot-b{background:var(--emerald);box-shadow:0 0 8px rgba(5,150,105,.5)}
.score-number{font-size:1.8rem;font-weight:900;color:var(--gray-900);margin-left:auto;font-variant-numeric:tabular-nums;min-width:2.5rem;text-align:right;line-height:1}
.score-btns{display:flex;gap:3px;flex-shrink:0}
.btn-score{display:inline-flex;align-items:center;justify-content:center;padding:4px 8px;border-radius:999px;font-weight:700;font-size:.65rem;font-family:inherit;border:2px solid transparent;cursor:pointer;transition:all .2s var(--ease-bounce);line-height:1;white-space:nowrap}
.btn-score:hover{transform:translateY(-2px) scale(1.05)}
.btn-score:active{transform:scale(.93)}
.btn-score.plus-a{color:var(--violet);background:var(--violet-bg);border-color:var(--violet-border)}
.btn-score.plus-a:hover{background:var(--violet);color:#fff}
.btn-score.plus-b{color:var(--emerald);background:var(--emerald-bg);border-color:var(--emerald-border)}
.btn-score.plus-b:hover{background:var(--emerald);color:#fff}
.btn-score.minus{color:var(--rose);background:var(--rose-bg);border-color:#fecaca}
.btn-score.minus:hover{background:var(--rose);color:#fff}
.vs-badge{font-size:.55rem;font-weight:900;color:var(--gray-300);letter-spacing:2px;flex-shrink:0}
.turn-badge{font-size:.5rem;font-weight:900;text-transform:uppercase;letter-spacing:1px;padding:3px 10px;border-radius:999px;white-space:nowrap;flex-shrink:0}

/* ═══ BOARD ═══ */
.board-area{flex:1;display:flex;flex-direction:column;align-items:center;padding:24px 16px 32px;max-width:900px;margin:0 auto;width:100%}
.board-title{text-align:center;margin-bottom:24px}
.board-title h1{font-size:1.4rem;font-weight:900;color:var(--gray-900)}
.board-title h1 span{color:var(--violet)}
.board-title p{font-size:.75rem;font-weight:700;color:var(--gray-400);margin-top:4px;letter-spacing:1px;text-transform:uppercase}
.slot-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;width:100%;max-width:520px;margin-bottom:20px}
.slot-card{position:relative;border-radius:1.3rem;background:#fff;border:2px solid rgba(0,0,0,.04);cursor:pointer;user-select:none;display:flex;flex-direction:column;align-items:center;justify-content:center;aspect-ratio:1;padding:8px;transition:all .3s var(--ease-bounce);will-change:transform;animation:float var(--float-dur,3s) ease-in-out infinite;animation-delay:var(--float-delay,0s)}
.slot-card:hover{transform:scale(1.06) translateY(-6px);box-shadow:0 20px 40px -12px rgba(0,0,0,.15)!important;border-color:var(--hover-color,#7C3AED)}
.slot-card:active{transform:scale(.95)}
.slot-card.solved{background:var(--gray-50);border-color:var(--gray-200);opacity:.85;cursor:pointer;animation:none;transform:none!important;box-shadow:0 2px 8px rgba(0,0,0,.04)!important}
.slot-card.solved:hover{transform:scale(1.03) translateY(-2px)!important;opacity:1;border-color:var(--gray-300)}
.slot-card.solved .slot-num{color:var(--gray-400)}
.slot-num{font-size:1.3rem;font-weight:900;color:var(--gray-800);line-height:1;transition:color .3s}
.slot-icon{font-size:.5rem;margin-top:2px;line-height:1}
.board-footer{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}
.progress-chip{font-size:.7rem;font-weight:700;color:var(--gray-400);background:#fff;border-radius:999px;padding:6px 18px;border:1px solid var(--gray-100);box-shadow:0 2px 6px rgba(0,0,0,.03)}
.btn-reset{font-size:.7rem;font-weight:700;color:var(--gray-400);background:#fff;border-radius:999px;padding:6px 18px;border:1px solid var(--gray-100);cursor:pointer;transition:all .2s;font-family:inherit;box-shadow:0 2px 6px rgba(0,0,0,.03)}
.btn-reset:hover{background:var(--rose-bg);color:var(--rose);border-color:#fecaca}
.btn-desempate{display:inline-flex;align-items:center;gap:12px;padding:18px 40px;border-radius:1.5rem;font-weight:900;font-size:1.5rem;color:#92400e;background:linear-gradient(135deg,#fcd34d,#f59e0b);border:2px solid #fbbf24;cursor:pointer;transition:transform .3s;font-family:inherit;box-shadow:0 0 40px rgba(245,158,11,.3);animation:pulseGold 2s ease-in-out infinite}
.btn-desempate:hover{transform:scale(1.05)}

/* ═══ MODAL ═══ */
.modal-overlay{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:40;animation:fadeIn .3s ease-out}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-container{position:relative;z-index:50;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;background:#fff;border-radius:1.8rem;box-shadow:0 30px 60px rgba(0,0,0,.15);border:1px solid var(--gray-100);padding:28px 24px;animation:fadeUp .35s var(--ease-bounce)}
.modal-container::-webkit-scrollbar{width:4px}
.modal-container::-webkit-scrollbar-thumb{background:var(--gray-200);border-radius:99px}

/* ═══ BETTING ═══ */
.bet-header{text-align:center;margin-bottom:20px}
.bet-turn-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:999px;font-size:.7rem;font-weight:900;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.bet-turn-badge.a{background:var(--violet-bg);color:var(--violet)}
.bet-turn-badge.b{background:var(--emerald-bg);color:var(--emerald)}
.bet-title{font-size:1.5rem;font-weight:900;color:var(--gray-900)}
.bet-subtitle{font-size:.85rem;font-weight:600;color:var(--gray-400);margin-top:4px}
.bet-cards{display:flex;gap:12px}
.bet-card{flex:1;padding:24px 12px;border-radius:1.5rem;background:#fff;border:2.5px solid var(--gray-200);text-align:center;cursor:pointer;transition:all .3s var(--ease-bounce);animation:fadeUp .4s var(--ease-bounce) both}
.bet-card:nth-child(1){animation-delay:.05s}
.bet-card:nth-child(2){animation-delay:.15s}
.bet-card:hover{transform:translateY(-4px) scale(1.03)}
.bet-card:active{transform:scale(.97)}
.bet-card-emoji{font-size:2rem;margin-bottom:8px}
.bet-card-title{font-size:1.1rem;font-weight:900;color:var(--gray-800)}
.bet-card-pts{font-size:.85rem;font-weight:700;color:var(--gray-400);margin-top:4px}
.bet-card-desc{font-size:.7rem;font-weight:600;color:var(--gray-300);margin-top:6px}
.bet-cancel{display:block;margin:16px auto 0;font-size:.75rem;font-weight:700;color:var(--gray-400);background:none;border:none;cursor:pointer;transition:color .2s;font-family:inherit}
.bet-cancel:hover{color:var(--gray-600)}

/* ═══ QUESTION ═══ */
.q-section{text-align:center;margin-bottom:16px}
.q-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:999px;font-size:.65rem;font-weight:900;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.q-badge.a{background:var(--violet-bg);color:var(--violet)}
.q-badge.b{background:var(--emerald-bg);color:var(--emerald)}
.q-text{font-size:1rem;font-weight:700;color:var(--gray-800);line-height:1.5}
.q-reveal-area{display:flex;flex-direction:column;align-items:center;gap:12px}
.btn-reveal{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;border-radius:1.3rem;font-weight:900;font-size:.85rem;color:#fff;background:linear-gradient(135deg,var(--violet),#6D28D9);border:none;cursor:pointer;box-shadow:0 6px 20px rgba(124,58,237,.25);transition:all .2s var(--ease-bounce);font-family:inherit}
.btn-reveal:hover{transform:translateY(-3px) scale(1.04);box-shadow:0 10px 28px rgba(124,58,237,.3)}
.btn-reveal:active{transform:scale(.97)}
.btn-reveal svg{flex-shrink:0}

/* ═══ TIMER ═══ */
.timer-area{display:flex;flex-direction:column;align-items:center;margin-top:12px}
.timer-ring-wrap{position:relative;width:72px;height:72px}
.timer-svg{position:absolute;inset:0;transform:rotate(-90deg)}
.timer-ring-bg{fill:none;stroke:var(--gray-200);stroke-width:6}
.timer-ring-prog{fill:none;stroke:var(--violet);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke .3s}
.timer-ring-prog.danger{stroke:var(--rose)}
.timer-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:900;color:var(--gray-800)}
.timer-text.danger{color:var(--rose)}

/* ═══ OPTIONS ═══ */
.options-area{margin-top:14px;display:flex;flex-direction:column;gap:8px}
.btn-opt{width:100%;padding:12px 16px;text-align:left;background:#fff;border:2.5px solid var(--gray-200);color:var(--gray-800);font-family:inherit;font-size:.88rem;font-weight:700;border-radius:1rem;cursor:pointer;transition:all .2s var(--ease-bounce);opacity:0;transform:scale(.7) translateY(10px);animation:optPop .35s var(--ease-bounce) forwards;line-height:1.35}
.btn-opt:nth-child(1){animation-delay:.05s}
.btn-opt:nth-child(2){animation-delay:.12s}
.btn-opt:nth-child(3){animation-delay:.19s}
.btn-opt:nth-child(4){animation-delay:.26s}
.btn-opt:hover:not(:disabled){border-color:var(--violet);background:var(--violet-bg);transform:translateY(-2px) scale(1.01)}
.btn-opt:active:not(:disabled){transform:scale(.98)}
.btn-opt:disabled{cursor:default;opacity:.7}
.btn-opt.correct{border-color:var(--success)!important;background:var(--success-bg)!important;color:#065f46!important}
.btn-opt.wrong{border-color:var(--rose)!important;background:var(--rose-bg)!important;color:#991b1b!important;opacity:.65}
.opt-letter{font-weight:900;color:var(--violet);margin-right:3px}

/* ═══ RESULT ═══ */
.result-icon{display:inline-flex;align-items:center;justify-content:center;width:60px;height:60px;border-radius:50%;font-size:1.8rem;margin-bottom:12px}
.result-icon.correct-icon{background:var(--success-bg);color:var(--success)}
.result-icon.wrong-icon{background:var(--rose-bg);color:var(--rose)}
.result-title{font-size:1.3rem;font-weight:900}
.result-title.correct-title{color:#065f46}
.result-title.wrong-title{color:#991b1b}
.result-sub{font-size:.8rem;font-weight:700;color:var(--gray-400);margin-top:4px}
.result-answer-box{background:var(--gray-50);border-radius:1.2rem;padding:16px;margin:16px 0;border:1px solid var(--gray-100);animation:fadeUp .4s var(--ease-bounce)}
.result-answer-box-label{font-size:.65rem;font-weight:900;color:var(--gray-400);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.result-answer-text{font-size:.9rem;font-weight:700;color:var(--gray-800)}
.explanation-box{background:var(--amber-bg);border-radius:1.2rem;padding:16px;border:1px solid var(--amber-border);animation:fadeUp .5s var(--ease-bounce)}
.explanation-box-label{display:flex;align-items:center;gap:6px;font-size:.65rem;font-weight:900;color:#92400e;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.explanation-box p{font-size:.82rem;font-weight:600;color:#78350f;line-height:1.5}
.btn-continue{width:100%;padding:14px;border:none;border-radius:1.2rem;font-weight:900;font-size:.85rem;color:#fff;cursor:pointer;transition:all .2s var(--ease-bounce);font-family:inherit;margin-top:16px}
.btn-continue:hover{opacity:.9;transform:translateY(-2px)}
.btn-continue:active{transform:scale(.97)}

/* ═══ REVIEW ═══ */
.review-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.review-icon{font-size:1.3rem}
.review-header h2{font-size:1.1rem;font-weight:900;color:var(--gray-800)}
.review-slot-badge{font-size:.6rem;font-weight:900;padding:3px 10px;border-radius:999px;background:var(--gray-100);color:var(--gray-500);margin-left:auto}
.review-q-text{font-size:.95rem;font-weight:700;color:var(--gray-800);line-height:1.5;margin-bottom:12px;background:var(--gray-50);border-radius:1rem;padding:14px;border:1px solid var(--gray-100)}
.review-answers{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.review-answer{padding:10px 14px;border-radius:.9rem;font-size:.82rem;font-weight:700;border:2px solid var(--gray-200);display:flex;align-items:center;gap:8px}
.review-answer.selected-correct{background:var(--success-bg);border-color:var(--success);color:#065f46}
.review-answer.selected-wrong{background:var(--rose-bg);border-color:var(--rose);color:#991b1b}
.review-answer.correct-answer{background:var(--success-bg);border-color:var(--success);color:#065f46;opacity:.7}
.review-answer-pts{font-size:.75rem;font-weight:700;color:var(--gray-500);margin-bottom:8px;padding:6px 12px;border-radius:999px;background:var(--gray-50);display:inline-block}
.review-change-section{margin-top:12px;padding-top:12px;border-top:1px solid var(--gray-100)}
.review-change-title{font-size:.75rem;font-weight:900;color:var(--gray-500);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.review-options{display:flex;flex-direction:column;gap:6px}
.review-opt{padding:10px 14px;border-radius:.9rem;font-size:.82rem;font-weight:700;border:2.5px solid var(--gray-200);background:#fff;cursor:pointer;transition:all .2s var(--ease-bounce);font-family:inherit;text-align:left;color:var(--gray-800)}
.review-opt:hover{border-color:var(--violet);background:var(--violet-bg);transform:translateX(4px)}
.review-opt:active{transform:scale(.98)}
.review-opt.current-sel{border-color:var(--violet);background:var(--violet-bg)}
.review-opt.mark-correct{border-color:var(--success)!important;background:var(--success-bg)!important;color:#065f46!important}
.btn-close-modal{width:100%;padding:12px;border-radius:1rem;font-weight:800;font-size:.8rem;background:var(--gray-100);color:var(--gray-500);border:none;cursor:pointer;transition:all .2s;font-family:inherit;margin-top:12px}
.btn-close-modal:hover{background:var(--gray-200);color:var(--gray-700)}

/* ═══ SUDDEN DEATH ═══ */
.sd-container{text-align:center}
.sd-icon{font-size:3rem;margin-bottom:12px}
.sd-title{font-size:1.5rem;font-weight:900;color:#92400e;margin-bottom:4px}
.sd-sub{font-size:.8rem;font-weight:700;color:var(--amber);margin-bottom:16px}
.sd-q-box{background:var(--gray-50);border-radius:1.2rem;padding:16px;margin-bottom:16px;border:1px solid var(--gray-100)}
.sd-q-text{font-size:.95rem;font-weight:700;color:var(--gray-800);line-height:1.5}

  {"id":5,"q":"¿Cómo califica textualmente el versículo 4 al que dice: 'Yo le conozco', y no guarda sus mandamientos?","o":["A) Como un cristiano inmaduro.","B) El tal es mentiroso, y la verdad no está en él.","C) Como un maestro con una perspectiva diferente."],"correct":"B","exp":"La Escritura es tajante en el versículo 4: 'El que dice: Yo le conozco, y no guarda sus mandamientos, el tal es mentiroso, y la verdad no está en él'."},

  {"id":18,"q":"Según el versículo 15, si alguno ama al mundo, ¿qué realidad se evidencia en él?","o":["A) Que necesita una doble porción de fe.","B) El amor del Padre no está en él.","C) Que es un creyente con gustos seculares."],"correct":"B","exp":"La Escritura establece una exclusión mutua en el v. 15: 'Si alguno ama al mundo, el amor del Padre no está en él'."},
  {"id":19,"q":"Cuáles son las tres cosas que están en el mundo según la descripción exacta del versículo 16?","o":["A) La idolatría, la rebelión y la hechicería.","B) Los deseos de la carne, los deseos de los ojos, y la vanagloria de la vida.","C) Las riquezas, los imperios políticos y las guerras."],"correct":"B","exp":"El versículo 16 enumera de forma precisa: 'Porque todo lo que hay en el mundo, los deseos de la carne, los deseos de los ojos, y la vanagloria de la vida, no proviene del Padre, sino del mundo'."},
  {"id":20,"q":"De acuerdo con el versículo 17, ¿qué pasa con el mundo y sus deseos, en contraste con el que hace la voluntad de Dios?","o":["A) El mundo y sus deseos pasan; pero el que hace la voluntad de Dios permanece para siempre.","B) Ambos permanecen hasta el fin de los tiempos.","C) El mundo se transforma en un lugar santo poco a poco."],"correct":"A","exp":"El versículo 17 muestra el contraste de duración: 'Y el mundo pasa, y sus deseos; pero el que hace la voluntad de Dios permanece para siempre'."},
  {"id":21,"q":"Según el versículo 19, ¿qué demostró el hecho de que ciertos individuos salieran de la comunidad?","o":["A) Que necesitaban abrir nuevas congregaciones.","B) Salieron de nosotros, pero no eran de nosotros; porque si hubiesen sido de nosotros, habrían permanecido.","C) Que los apóstoles les dieron cartas de recomendación para viajar."],"correct":"B","exp":"El versículo 19 aclara la naturaleza de los disidentes: 'Salieron de nosotros, pero no eran de nosotros; porque si hubiesen sido de nosotros, habrían permanecido con nosotros'."},
  {"id":22,"q":"De acuerdo con lo expresado en el versículo 20, ¿qué han recibido los creyentes de parte del Santo y qué efecto produce?","o":["A) Una señal externa y milagrosa.","B) Vosotros tenéis la unción del Santo, y conocéis todas las cosas.","C) Una serie de normas e instrucciones ocultas."],"correct":"B","exp":"El texto del versículo 20 afirma: 'Pero vosotros tenéis la unción del Santo, y conocéis todas las cosas'."},
  {"id":23,"q":"Según el versículo 22, ¿quién es definido textualmente como el mentiroso?","o":["A) El que altera las fechas de las fiestas.","B) El que niega que Jesús es el Cristo.","C) El que no diezma sus bienes."],"correct":"B","exp":"El versículo 22 declara explícitamente: '¿Quién es el mentiroso, sino el que niega que Jesús es el Cristo? Este es anticristo, el que niega al Padre y al Hijo'."},
  {"id":24,"q":"En el versículo 23, ¿cuál es la consecuencia absoluta para todo aquel que niega al Hijo?","o":["A) Tampoco tiene al Padre.","B) Debe ser instruido nuevamente durante un año.","C) Pierde su posición social en el pueblo."],"correct":"A","exp":"El versículo 23 muestra la unión inseparable entre ambos: 'Todo aquel que niega al Hijo, tampoco tiene al Padre. El que confiesa al Hijo, tiene también al Padre'."},
  {"id":25,"q":"De acuerdo con el versículo 27, ¿cuál es la instrucción sobre la unción que recibisteis de él?","o":["A) Que se debe renovar mediante ceremonias continuas.","B) La unción que vosotros recibisteis de él permanece en vosotros, y no tenéis necesidad de que nadie os enseñe.","C) Que se retira cada vez que pasáis por un desánimo."],"correct":"B","exp":"El texto del versículo 27 provee seguridad absoluta: 'Pero la unción que vosotros recibisteis de él permanece en vosotros, y no tenéis necesidad de que nadie os enseñe; así como la unción misma os enseña todas las cosas...'."}
];

const QUESTIONS = RAW_QUESTIONS.map(q => ({
  ...q,
  choices: q.o.map(opt => ({ key: opt[0], text: opt.substring(3).trim() })),
  correctIdx: q.correct.charCodeAt(0) - 65
}));

// ═══════════════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════════════
const TIMER_SECONDS = 20;
const CIRCUMFERENCE = 264;
const COLORS = { A: '#7C3AED', B: '#059669' };
const SHADOWS = ['shadow-lg','shadow-xl','shadow-2xl'];

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
const state = {
  teamAName: 'Equipo A',
  teamBName: 'Equipo B',
  slots: [],
  scores: { A: 0, B: 0 },
  currentTeam: 'A',
  currentSlotId: null,
  currentQuestion: null,
  currentBet: 0,
  modalPhase: null, // null | betting | answering | result | review | sudden-death | winner
  timer: TIMER_SECONDS,
  timerInterval: null,
  isRevealed: false,
  gameOver: false,
  answeredCount: 0
};

// ═══════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════

const dom = {

  screenBoard: $('screen-board'),

  modal: $('modal'),
  modalBody: $('modal-body'),

};

// ═══════════════════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════════════════
function getTeamName(t) { return t === 'A' ? state.teamAName : state.teamBName; }
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function getAudioCtx() {
  if (!window._aCtx) window._aCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (window._aCtx.state === 'suspended') window._aCtx.resume();
  return window._aCtx;
}
function playSound(type) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    if (type === 'correct') {
      osc.type = 'sine'; osc.frequency.setValueAtTime(600,ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1200,ctx.currentTime+.1);
      gain.gain.setValueAtTime(0,ctx.currentTime);
      gain.gain.linearRampToValueAtTime(.5,ctx.currentTime+.05);
      gain.gain.exponentialRampToValueAtTime(.01,ctx.currentTime+.5);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime+.5);
    } else {
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150,ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(90,ctx.currentTime+.3);
      gain.gain.setValueAtTime(0,ctx.currentTime);
      gain.gain.linearRampToValueAtTime(.3,ctx.currentTime+.05);
      gain.gain.exponentialRampToValueAtTime(.01,ctx.currentTime+.4);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime+.4);
    }
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════════════
//  WELCOME
// ═══════════════════════════════════════════════════════════════
function goToBoard() {
  const na = dom.inputA.value.trim() || 'Equipo A';
  const nb = dom.inputB.value.trim() || 'Equipo B';
  state.teamAName = na;
  state.teamBName = nb;
  dom.teamA.textContent = na;
  dom.teamB.textContent = nb;
  dom.screenWelcome.classList.add('hidden');
  dom.screenBoard.classList.remove('hidden');
  initGame();
}

// ═══════════════════════════════════════════════════════════════
//  SCORES
// ═══════════════════════════════════════════════════════════════
function renderScores() {
  dom.scoreA.textContent = state.scores.A;
  dom.scoreB.textContent = state.scores.B;
}

function addScore(team, delta) {
  state.scores[team] += delta;
  renderScores();
  const el = team === 'A' ? dom.scoreA : dom.scoreB;
  el.classList.remove('score-pop');
  void el.offsetWidth;
  el.classList.add('score-pop');
}

function recalculateScores() {
  const s = { A: 0, B: 0 };
  state.slots.forEach(slot => {
    if (slot.isSolved && slot.currentTeam) s[slot.currentTeam] += slot.earnedPoints;
  });
  state.scores = s;
  renderScores();
}

function updateTurnUI() {
  const t = state.currentTeam, isA = t === 'A';
  dom.panelA.className = `team-panel ${isA ? 'active-a' : 'inactive'}`;
  dom.panelB.className = `team-panel ${!isA ? 'active-b' : 'inactive'}`;
  dom.dotA.style.display = isA ? 'block' : 'none';
  dom.dotB.style.display = !isA ? 'block' : 'none';
  dom.turnBadge.textContent = `TURNO ${t}`;
  dom.turnBadge.style.cssText = `background:${isA ? 'var(--violet-bg)' : 'var(--emerald-bg)'};color:${isA ? 'var(--violet)' : 'var(--emerald)'}`;
}

// ═══════════════════════════════════════════════════════════════
//  SLOTS
// ═══════════════════════════════════════════════════════════════
function buildSlots() {
  const shuffled = shuffle(QUESTIONS);
  state.slots = Array.from({ length: 25 }, (_, i) => ({
    slotId: i + 1,
    question: shuffled[i],
    isSolved: false,
    selectedAnswer: null,
    earnedPoints: 0,
    currentTeam: null,
    pointsValue: 100
  }));
}

function renderBoard() {
  const solved = state.slots.filter(s => s.isSolved).length;
  state.answeredCount = solved;
  dom.progress.textContent = `${solved} / 25 respondidas`;

  dom.grid.innerHTML = state.slots.map(slot => {
    const isSolved = slot.isSolved;
    const floatDur = (2.5 + (slot.slotId % 5) * .3).toFixed(1);
    const floatDelay = ((slot.slotId * .17) % 3).toFixed(2);
    const shadowIdx = (slot.slotId - 1) % 3;
    return `<button class="slot-card${isSolved?' solved':''}" data-slot-id="${slot.slotId}"
      style="${isSolved?'':`--float-dur:${floatDur}s;--float-delay:${floatDelay}s;--hover-color:${slot.slotId%2===0?'#7C3AED':'#059669'};box-shadow:${shadowIdx===0?'0 8px 24px -8px rgba(0,0,0,.08)':shadowIdx===1?'0 12px 32px -10px rgba(0,0,0,.1)':'0 20px 48px -12px rgba(0,0,0,.12)'}`}"
      onclick="handleSlotClick(${slot.slotId})">
      <span class="slot-num">${slot.slotId}</span>
      <span class="slot-icon">${isSolved ? '👁️' : '●'}</span>
    </button>`;
  }).join('');

  checkGameEnd();
}

// ═══════════════════════════════════════════════════════════════
//  GAME FLOW
// ═══════════════════════════════════════════════════════════════
function handleSlotClick(slotId) {
  const slot = state.slots.find(s => s.slotId === slotId);
  if (!slot) return;
  if (slot.isSolved) { showReviewModal(slot); return; }
  if (state.gameOver) return;
  state.currentSlotId = slotId;
  state.currentQuestion = slot.question;
  state.isRevealed = false;
  stopTimer();
  showBettingScreen();
}

// ─── BETTING ──────────────────────────────────
function showBettingScreen() {
  state.modalPhase = 'betting';
  const t = state.currentTeam;
  dom.modalBody.innerHTML = `
    <div class="bet-header">
      <div class="bet-turn-badge ${t.toLowerCase()}">Turno de ${getTeamName(t)}</div>
      <div class="bet-title">¿Cuántos puntos desean colocar en juego?</div>
      <div class="bet-subtitle">Elige el riesgo para esta pregunta</div>
    </div>
    <div class="bet-cards">
      <div class="bet-card" onclick="selectBet(100)" style="border-color:${t==='A'?'rgba(124,58,237,.15)':'rgba(5,150,105,.15)'}">
        <div class="bet-card-emoji">🛡️</div>
        <div class="bet-card-title">Estándar</div>
        <div class="bet-card-pts">+100 / −100 pts</div>
        <div class="bet-card-desc">Seguro y estable</div>
      </div>
      <div class="bet-card" onclick="selectBet(200)" style="border-color:${t==='A'?'rgba(124,58,237,.15)':'rgba(5,150,105,.15)'}">
        <div class="bet-card-emoji">⚡</div>
        <div class="bet-card-title">Doble o Nada</div>
        <div class="bet-card-pts">+200 / −200 pts</div>
        <div class="bet-card-desc">Alto riesgo</div>
      </div>
    </div>
    <button class="bet-cancel" onclick="closeModal()">Cancelar</button>`;
  showModal();
}

function selectBet(amount) {
  state.currentBet = amount;
  state.modalPhase = 'answering';
  state.isRevealed = false;
  stopTimer();
  state.timer = TIMER_SECONDS;
  const q = state.currentQuestion;
  const t = state.currentTeam;
  dom.modalBody.innerHTML = `
    <div class="q-section">
      <div class="q-badge ${t.toLowerCase()}">${getTeamName(t)} · ${amount === 100 ? 'Estándar' : '¡Doble o Nada!'}</div>
      <div class="q-text">${q.q}</div>
    </div>
    <div class="q-reveal-area">
      <button class="btn-reveal" id="btn-reveal" onclick="revealOptions()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        Revelar Opciones
      </button>
      <p style="font-size:.7rem;font-weight:600;color:var(--gray-400)">Lee la pregunta en voz alta antes de revelar</p>
    </div>
    <div id="timer-area" class="timer-area hidden">
      <div class="timer-ring-wrap">
        <svg class="timer-svg" viewBox="0 0 84 84">
          <circle class="timer-ring-bg" cx="42" cy="42" r="36"/>
          <circle id="timer-ring-prog" class="timer-ring-prog" cx="42" cy="42" r="36" stroke="${COLORS[t]}" stroke-dasharray="${CIRCUMFERENCE}" stroke-dashoffset="0"/>
        </svg>
        <span id="timer-text" class="timer-text">${TIMER_SECONDS}</span>
      </div>
    </div>
    <div id="options-area" class="options-area hidden"></div>`;
  showModal();
}

function revealOptions() {
  if (state.isRevealed) return;
  state.isRevealed = true;
  state.modalPhase = 'revealed';
  const q = state.currentQuestion;
  const t = state.currentTeam;
  const ta = document.getElementById('timer-area');
  const oa = document.getElementById('options-area');
  const rb = document.getElementById('btn-reveal');
  if (rb) rb.style.display = 'none';
  if (ta) ta.classList.remove('hidden');
  if (oa) {
    oa.classList.remove('hidden');
    oa.innerHTML = q.choices.map((c,i) =>
      `<button class="btn-opt" onclick="handleAnswer(${i})"><span class="opt-letter" style="color:${COLORS[t]}">${c.key})</span> ${c.text}</button>`
    ).join('');
  }
  startTimer();
}

// ─── ANSWER ───────────────────────────────────
function handleAnswer(idx) {
  if (state.modalPhase === 'result') return;
  stopTimer();
  const q = state.currentQuestion;
  const isCorrect = idx === q.correctIdx;
  state._lastAnswerIdx = idx;
  playSound(isCorrect ? 'correct' : 'wrong');
  document.querySelectorAll('.btn-opt').forEach((btn,i) => {
    btn.disabled = true;
    if (i === q.correctIdx) btn.classList.add('correct');
    else if (i === idx) btn.classList.add('wrong');
  });
  state.modalPhase = 'result';
  setTimeout(() => showResult(isCorrect), 600);
}

function showResult(isCorrect) {
  const q = state.currentQuestion;
  const t = state.currentTeam;
  const bet = state.currentBet;
  const points = isCorrect ? bet : -bet;
  const accent = t === 'A' ? COLORS.A : COLORS.B;

  // Save slot state
  const slot = state.slots.find(s => s.slotId === state.currentSlotId);
  if (slot) {
    slot.isSolved = true;
    slot.selectedAnswer = state._lastAnswerIdx !== undefined ? state._lastAnswerIdx : q.correctIdx;
    slot.earnedPoints = points;
    slot.currentTeam = t;
    slot.pointsValue = bet;
  }
  addScore(t, points);

  const correctKey = q.choices[q.correctIdx].key;
  const correctText = q.choices[q.correctIdx].text;

  dom.modalBody.innerHTML = `
    <div class="text-center" style="margin-bottom:12px;animation:slideDown .4s var(--ease-bounce)">
      <div class="result-icon ${isCorrect ? 'correct-icon' : 'wrong-icon'}">${isCorrect ? '✓' : '✗'}</div>
      <div class="result-title ${isCorrect ? 'correct-title' : 'wrong-title'}">${isCorrect ? '¡Respuesta Correcta!' : 'Respuesta Incorrecta'}</div>
      <div class="result-sub">${getTeamName(t)} <span style="color:${isCorrect ? 'var(--success)' : 'var(--rose)'}">${isCorrect ? '+' + points : points} pts</span></div>
    </div>
    <div class="result-answer-box">
      <div class="result-answer-box-label">Respuesta correcta</div>
      <div class="result-answer-text"><span class="opt-letter" style="color:var(--violet)">${correctKey})</span> ${correctText}</div>
    </div>
    <div class="explanation-box">
      <div class="explanation-box-label"><span>📖</span> Explicación</div>
      <p>${q.exp}</p>
    </div>
    <button class="btn-continue" style="background:${accent}" onclick="continueGame()">Continuar →</button>`;
  showModal();
}

function continueGame() {
  closeModal();
  state.currentSlotId = null;
  state.currentQuestion = null;
  state.currentBet = 0;
  state.isRevealed = false;
  state.modalPhase = null;
  state.currentTeam = state.currentTeam === 'A' ? 'B' : 'A';
  updateTurnUI();
  renderBoard();
  renderScores();
}

// ═══════════════════════════════════════════════════════════════
//  REVIEW & EDIT
// ═══════════════════════════════════════════════════════════════
function showReviewModal(slot) {
  state.modalPhase = 'review';
  const q = slot.question;
  const isCorrect = slot.selectedAnswer === q.correctIdx;
  const teamName = getTeamName(slot.currentTeam);
  const ptsLabel = slot.earnedPoints >= 0 ? '+' + slot.earnedPoints : slot.earnedPoints;

  let answersHtml = q.choices.map((c,i) => {
    let cls = 'review-answer';
    if (i === q.correctIdx) cls += ' correct-answer';
    if (i === slot.selectedAnswer && i === q.correctIdx) cls += ' selected-correct';
    else if (i === slot.selectedAnswer) cls += ' selected-wrong';
    return `<div class="${cls}">${i === q.correctIdx ? '✅' : (i === slot.selectedAnswer ? '❌' : '')} <span class="opt-letter">${c.key})</span> ${c.text}</div>`;
  }).join('');

  let changeHtml = q.choices.map((c,i) => {
    let cls = 'review-opt';
    if (i === slot.selectedAnswer) cls += ' current-sel';
    if (i === q.correctIdx) cls += ' mark-correct';
    return `<button class="${cls}" onclick="changeAnswer(${slot.slotId}, ${i})"><span class="opt-letter">${c.key})</span> ${c.text}</button>`;
  }).join('');

  dom.modalBody.innerHTML = `
    <div class="review-header">
      <span class="review-icon">🔍</span>
      <h2>Revisión de Respuesta</h2>
      <span class="review-slot-badge">Slot ${slot.slotId}</span>
    </div>
    <div class="review-q-text">${q.q}</div>
    <div class="review-answers">${answersHtml}</div>
    <div class="review-answer-pts">${ptsLabel} pts · ${teamName} · ${slot.pointsValue === 100 ? 'Estándar' : 'Doble o Nada'}</div>
    <div class="explanation-box" style="margin-bottom:12px">
      <div class="explanation-box-label"><span>📖</span> Explicación</div>
      <p>${q.exp}</p>
    </div>
    <div class="review-change-section">
      <div class="review-change-title">Cambiar respuesta:</div>
      <div class="review-options">${changeHtml}</div>
    </div>
    <button class="btn-close-modal" onclick="closeModal()">Cerrar</button>`;
  showModal();
}

function changeAnswer(slotId, newIdx) {
  const slot = state.slots.find(s => s.slotId === slotId);
  if (!slot || !slot.isSolved) return;
  if (slot.selectedAnswer === newIdx) { closeModal(); return; }

  const q = slot.question;
  const wasCorrect = slot.selectedAnswer === q.correctIdx;
  const nowCorrect = newIdx === q.correctIdx;

  // Update slot
  slot.selectedAnswer = newIdx;
  slot.earnedPoints = nowCorrect ? slot.pointsValue : -slot.pointsValue;

  playSound(nowCorrect ? 'correct' : 'wrong');
  recalculateScores();
  renderBoard();
  showReviewModal(slot);
}

// ═══════════════════════════════════════════════════════════════
//  TIMER
// ═══════════════════════════════════════════════════════════════
function startTimer() {
  stopTimer();
  state.timer = TIMER_SECONDS;
  updateTimerUI(TIMER_SECONDS);
  state.timerInterval = setInterval(() => {
    state.timer--;
    updateTimerUI(state.timer);
    if (state.timer <= 5) {
      const ring = document.getElementById('timer-ring-prog');
      const txt = document.getElementById('timer-text');
      if (ring) ring.style.stroke = '#ef4444';
      if (txt) txt.style.color = '#ef4444';
    }
    if (state.timer <= 0) { stopTimer(); handleTimeout(); }
  }, 1000);
}

function stopTimer() { if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; } }

function updateTimerUI(s) {
  const ring = document.getElementById('timer-ring-prog');
  const txt = document.getElementById('timer-text');
  if (ring) ring.style.strokeDashoffset = CIRCUMFERENCE - (s / TIMER_SECONDS) * CIRCUMFERENCE;
  if (txt) txt.textContent = s;
}

function handleTimeout() {
  if (state.modalPhase === 'result') return;
  document.querySelectorAll('.btn-opt').forEach(b => b.disabled = true);
  showResult(false);
}

// ═══════════════════════════════════════════════════════════════
//  SUDDEN DEATH & WINNER
// ═══════════════════════════════════════════════════════════════
function checkGameEnd() {
  const solved = state.slots.filter(s => s.isSolved).length;
  const tie = state.scores.A === state.scores.B;
  if (solved === 25 && tie && !state.gameOver) {
    state.gameOver = true;
    dom.suddenDeathArea.classList.remove('hidden');
  } else if (solved === 25 && !tie) {
    showWinner();
  } else {
    dom.suddenDeathArea.classList.add('hidden');
  }
}

function showWinner() {
  state.gameOver = true;
  const winner = state.scores.A > state.scores.B ? 'A' : 'B';
  const name = getTeamName(winner);
  const score = state.scores[winner];
  dom.modalBody.innerHTML = `
    <div class="text-center" style="animation:slideDown .4s var(--ease-bounce)">
      <div class="winner-icon">🏆</div>
      <div class="winner-name">¡${name} Campeón!</div>
      <p style="font-size:.9rem;font-weight:700;color:var(--gray-400);margin-top:4px">Puntaje final: ${score} pts</p>
    </div>
    <div style="background:var(--gray-50);border-radius:1.2rem;padding:16px;margin:20px 0;border:1px solid var(--gray-100);text-align:center">
      <p style="font-size:.85rem;font-weight:600;color:var(--gray-500)">¡Gracias por estudiar 1 Juan 2!</p>
    </div>
    <button class="btn-continue" style="background:linear-gradient(135deg,var(--violet),#6D28D9)" onclick="resetGame()">↺ Jugar de Nuevo</button>`;
  showModal();
}

function startSuddenDeath() {
  const q = shuffle(QUESTIONS)[0];
  dom.modalBody.innerHTML = `
    <div class="sd-container">
      <div class="sd-icon">🏆</div>
      <div class="sd-title">¡Muerte Súbita!</div>
      <div class="sd-sub">Los equipos están empatados. Esta pregunta decide al ganador.</div>
    </div>
    <div class="sd-q-box"><div class="sd-q-text">${q.q}</div></div>
    <div class="sd-options">
      ${q.choices.map((c,i) =>
        `<button class="btn-opt" onclick="handleSdAnswer(${i},${q.correctIdx},'${q.exp.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')">
          <span class="opt-letter" style="color:var(--amber)">${c.key})</span> ${c.text}
        </button>`
      ).join('')}
    </div>`;
  dom.suddenDeathArea.classList.add('hidden');
  state._sdQ = q;
  closeModal();
  showModal();
}

function handleSdAnswer(idx, correctIdx, exp) {
  stopTimer();
  const q = state._sdQ;
  const isCorrect = idx === correctIdx;
  document.querySelectorAll('.sd-options .btn-opt').forEach((btn,i) => {
    btn.disabled = true;
    if (i === correctIdx) btn.classList.add('correct');
    else if (i === idx) btn.classList.add('wrong');
  });
  setTimeout(() => {
    const winnerTeam = isCorrect ? state.currentTeam : (state.currentTeam === 'A' ? 'B' : 'A');
    const name = getTeamName(winnerTeam);
    const correctKey = q.choices[correctIdx].key;
    const correctText = q.choices[correctIdx].text;
    dom.modalBody.innerHTML = `
      <div class="text-center" style="animation:slideDown .4s var(--ease-bounce)">
        <div class="winner-icon">🏆</div>
        <div class="winner-name">¡${name} Gana!</div>
        <p style="font-size:.8rem;font-weight:700;color:var(--gray-400);margin-top:4px">${isCorrect ? 'Respuesta correcta' : 'Respuesta incorrecta'}</p>
      </div>
      <div class="result-answer-box">
        <div class="result-answer-box-label">Respuesta correcta</div>
        <div class="result-answer-text"><span class="opt-letter" style="color:var(--violet)">${correctKey})</span> ${correctText}</div>
      </div>
      <div class="explanation-box">
        <div class="explanation-box-label"><span>📖</span> Explicación</div>
        <p>${exp}</p>
      </div>
      <button class="btn-continue" style="background:linear-gradient(135deg,var(--amber),#d97706)" onclick="resetGame()">↺ Jugar de Nuevo</button>`;
    state.gameOver = true;
    showModal();
  }, 600);
}

// ═══════════════════════════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════════════════════════
function showModal() { dom.modal.classList.remove('hidden'); document.body.style.overflow = 'hidden'; }
function closeModal() { dom.modal.classList.add('hidden'); document.body.style.overflow = ''; }

// ═══════════════════════════════════════════════════════════════
//  RESET
// ═══════════════════════════════════════════════════════════════
function resetGame() {
  stopTimer(); closeModal();
  state.scores = { A: 0, B: 0 };
  state.currentTeam = 'A';
  state.currentSlotId = null; state.currentQuestion = null; state.currentBet = 0;
  state.modalPhase = null; state.gameOver = false; state.isRevealed = false;
  state.timer = TIMER_SECONDS; state.answeredCount = 0; state._sdQ = null;
  dom.suddenDeathArea.classList.add('hidden');
  buildSlots(); renderBoard(); renderScores(); updateTurnUI();
}

function initGame() {
  buildSlots(); renderBoard(); renderScores(); updateTurnUI();
}

// ═══════════════════════════════════════════════════════════════
//  WIRING
// ═══════════════════════════════════════════════════════════════
dom.btnStart.addEventListener('click', goToBoard);
dom.btnReset.addEventListener('click', () => { if (confirm('¿Reiniciar el juego?')) resetGame(); });
dom.btnDesempate.addEventListener('click', startSuddenDeath);
dom.backdrop.addEventListener('click', () => { if (state.modalPhase === 'betting') closeModal(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && state.modalPhase === 'betting' && !dom.modal.classList.contains('hidden')) closeModal();
});
[dom.inputA, dom.inputB].forEach(inp => {
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') goToBoard(); });
});

// Manual score buttons
document.querySelectorAll('[data-team]').forEach(btn => {
  btn.addEventListener('click', () => {
    addScore(btn.dataset.team.toUpperCase(), parseInt(btn.dataset.pts));
  });
});

// ═══════════════════════════════════════════════════════════════
//  EXPOSE for inline onclick
// ═══════════════════════════════════════════════════════════════
window.handleSlotClick = handleSlotClick;
window.selectBet = selectBet;
window.revealOptions = revealOptions;
window.handleAnswer = handleAnswer;
window.continueGame = continueGame;
window.closeModal = closeModal;
window.startSuddenDeath = startSuddenDeath;
window.handleSdAnswer = handleSdAnswer;
window.resetGame = resetGame;
window.changeAnswer = changeAnswer;

// ═══════════════════════════════════════════════════════════════
//  INIT — start at welcome (board loads on click)
// ═══════════════════════════════════════════════════════════════
</script>
</body>
</html>
