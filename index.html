<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Camino del Justo: 1 Pedro 3</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <div class="header-main">
                <div class="brand">
                    <h1>El Camino del Justo</h1>
                    <p class="subtitle">Estudio Bíblico: 1 Pedro 3:8-22</p>
                </div>
                <div class="leaderboard">
                    <div class="team team-a">
                        <span class="team-label">Equipo A</span>
                        <span id="score-a" class="score">0</span>
                    </div>
                    <div class="team-divider">VS</div>
                    <div class="team team-b">
                        <span id="score-b" class="score">0</span>
                        <span class="team-label">Equipo B</span>
                    </div>
                </div>
            </div>
            <nav class="progress-nav">
                <div class="progress-bar-container">
                    <div class="progress-segment" data-idx="0">1</div>
                    <div class="progress-segment" data-idx="1">2</div>
                    <div class="progress-segment" data-idx="2">3</div>
                    <div class="progress-segment" data-idx="3">4</div>
                    <div class="progress-segment" data-idx="4">5</div>
                    <div class="progress-segment" data-idx="5">6</div>
                </div>
            </nav>
        </header>

        <main>
            <section id="game-section">
                <div id="study-card" class="glass-card">
                    <div class="card-meta">
                        <span id="current-verses">Versículos 3:8-9</span>
                    </div>
                    <div id="card-body">
                        <h2 id="current-question">Cargando pregunta...</h2>
                    </div>
                    <div id="card-footer">
                        <!-- Control buttons injected here -->
                    </div>
                </div>
            </section>
        </main>

        <div id="overlay" class="hidden">
            <div id="reward-modal" class="glass-card">
                <div class="modal-header">
                    <div class="icon">✨</div>
                    <h3>Caja de Sabiduría</h3>
                </div>
                <div id="reward-content" class="serif-text">
                    <!-- Theological explanation injected here -->
                </div>
                <button id="close-reward" class="btn-next">Continuar el Camino</button>
            </div>
        </div>

        <div id="admin-tools">
            <button id="btn-reset" title="Reiniciar Juego">🔄</button>
        </div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
