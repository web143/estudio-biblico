<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Bíblico — 1 Juan 2</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{font-family:'Inter',sans-serif;background:#FDFBF7;min-height:100vh;overflow-x:hidden}
:root{--ease-bounce:cubic-bezier(0.175,0.885,0.32,1.275);--ease-out:cubic-bezier(0.22,1,0.36,1)}
.bg-dots{background-image:radial-gradient(rgba(124,58,237,0.06) 1px,transparent 1px);background-size:24px 24px}
.slot-card{position:relative;border-radius:1.5rem;background:#fff;border:2px solid rgba(0,0,0,0.04);cursor:pointer;user-select:none;transition:all 0.3s var(--ease-bounce);animation:float var(--float-dur,3s) ease-in-out infinite;animation-delay:var(--float-delay,0s);will-change:transform}
.slot-card:hover{transform:scale(1.06) translateY(-6px);box-shadow:0 24px 48px -12px rgba(0,0,0,0.18)!important;border-color:var(--hover-color,#7C3AED)}
.slot-card:active{transform:scale(0.96)}
.slot-card.solved{opacity:0.5;cursor:default;animation:none;transform:none!important;border-color:rgba(0,0,0,0.06);box-shadow:0 2px 8px rgba(0,0,0,0.04)!important;pointer-events:none}
.slot-card.solved:hover{transform:none!important}
@keyframes float{0%,100%{transform:translateY(0px)}50%{transform:translateY(-7px)}}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseGold{0%,100%{box-shadow:0 0 20px rgba(245,158,11,0.3),0 0 60px rgba(245,158,11,0.15)}50%{box-shadow:0 0 40px rgba(245,158,11,0.5),0 0 80px rgba(245,158,11,0.25)}}
@keyframes scorePop{0%{transform:scale(1)}40%{transform:scale(1.35)}100%{transform:scale(1)}}
@keyframes antiGravityBreak{0%{transform:translateY(0);opacity:1}50%{transform:translateY(-40px);opacity:0.7}100%{transform:translateY(-80px);opacity:0}}
.score-pop{animation:scorePop 0.35s var(--ease-bounce)}
.anti-break{animation:antiGravityBreak 0.8s var(--ease-out) forwards}
.btn-opt{width:100%;padding:14px 20px;text-align:left;background:#fff;border:2.5px solid #e5e7eb;color:#1f2937;font-family:'Inter',sans-serif;font-size:0.95rem;font-weight:700;border-radius:1.2rem;cursor:pointer;transition:all 0.2s var(--ease-bounce);opacity:0;transform:scale(0.7) translateY(10px);animation:optPop 0.4s var(--ease-bounce) forwards;line-height:1.4}
.btn-opt:nth-child(1){animation-delay:0.05s}
.btn-opt:nth-child(2){animation-delay:0.13s}
.btn-opt:nth-child(3){animation-delay:0.21s}
.btn-opt:nth-child(4){animation-delay:0.29s}
@keyframes optPop{to{opacity:1;transform:scale(1) translateY(0)}}
.btn-opt:hover:not(:disabled){border-color:#7C3AED;background:#f5f3ff;transform:translateY(-2px) scale(1.02)}
.btn-opt:active:not(:disabled){transform:scale(0.98)}
.btn-opt:disabled{cursor:default;opacity:0.7}
.btn-opt.opt-correct{border-color:#10b981!important;background:#ecfdf5!important;color:#065f46!important}
.btn-opt.opt-wrong{border-color:#ef4444!important;background:#fef2f2!important;color:#991b1b!important;opacity:0.65}
.btn-opt.opt-correct .opt-letter,.btn-opt.opt-wrong .opt-letter{color:inherit!important}
.opt-letter{font-weight:900;color:#7C3AED;margin-right:4px}
.btn-float{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:6px 12px;border-radius:9999px;font-weight:700;font-size:0.75rem;font-family:'Inter',sans-serif;border:2px solid transparent;cursor:pointer;transition:all 0.2s var(--ease-bounce);line-height:1}
.btn-float:hover{transform:translateY(-2px) scale(1.05)}
.btn-float:active{transform:scale(0.95)}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);z-index:40;animation:fadeIn 0.3s ease-out}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.timer-ring{fill:none;stroke-width:7;stroke-linecap:round}
.bet-card{flex:1;padding:28px 20px;border-radius:2rem;background:#fff;border:2.5px solid #e5e7eb;text-align:center;cursor:pointer;transition:all 0.3s var(--ease-bounce);animation:optPop 0.4s var(--ease-bounce) both}
.bet-card:nth-child(1){animation-delay:0.05s}
.bet-card:nth-child(2){animation-delay:0.15s}
.bet-card:hover{transform:translateY(-4px) scale(1.03)}
.bet-card:active{transform:scale(0.97)}
.team-turn{position:relative}
.team-turn.active::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:8px;height:8px;border-radius:50%;background:#7C3AED;box-shadow:0 0 12px rgba(124,58,237,0.5)}
@media(max-width:640px){.slot-card{border-radius:1rem}.btn-opt{font-size:0.85rem;padding:12px 14px}}
@media(prefers-reduced-motion:reduce){.slot-card{animation:none!important}.btn-opt{animation:none!important;opacity:1!important;transform:none!important}.bet-card{animation:none!important}}
</style>
</head>
<body>

<div id="app" class="min-h-screen bg-[#FDFBF7] bg-dots flex flex-col">

  <!-- ===== SCOREBOARD ===== -->
  <header class="sticky top-0 z-30 bg-[#FDFBF7]/95 backdrop-blur-md border-b border-gray-100/80 px-3 sm:px-6 py-3">
    <div class="max-w-4xl mx-auto flex items-center gap-2 sm:gap-4">
      
      <!-- Team A -->
      <div id="panel-a" class="team-turn flex-1 flex flex-wrap items-center gap-1.5 sm:gap-2 p-2.5 sm:p-3 rounded-2xl transition-all duration-300 border-2 border-transparent bg-white/60" style="box-shadow:0 2px 8px rgba(0,0,0,0.04)">
        <span id="team-a-name" class="text-xs sm:text-sm font-extrabold text-gray-500 uppercase tracking-wider min-w-0 truncate">Equipo A</span>
        <div id="team-a-indicator" class="hidden w-2 h-2 rounded-full bg-violet-500 shadow-[0_0_8px_rgba(124,58,237,0.5)]"></div>
        <span id="score-a" class="text-2xl sm:text-3xl font-black text-gray-900 ml-auto tabular-nums min-w-[3rem] text-right">0</span>
        <div class="flex gap-1 ml-1">
          <button class="btn-float text-violet-600 bg-violet-50 border-violet-200 hover:bg-violet-100" data-team="a" data-pts="100">+100</button>
          <button class="btn-float text-violet-600 bg-violet-50 border-violet-200 hover:bg-violet-100" data-team="a" data-pts="200">+200</button>
          <button class="btn-float text-rose-500 bg-rose-50 border-rose-200 hover:bg-rose-100" data-team="a" data-pts="-100">−100</button>
          <button class="btn-float text-rose-500 bg-rose-50 border-rose-200 hover:bg-rose-100" data-team="a" data-pts="-200">−200</button>
        </div>
      </div>

      <!-- VS / Turn -->
      <div class="flex flex-col items-center gap-0.5 flex-shrink-0">
        <span class="text-[0.6rem] font-black text-gray-300 uppercase tracking-[2px]">vs</span>
        <span id="turn-badge" class="text-[0.55rem] font-black uppercase tracking-wider px-2 py-1 rounded-full bg-violet-100 text-violet-700 whitespace-nowrap">Turno A</span>
      </div>

      <!-- Team B -->
      <div id="panel-b" class="team-turn flex-1 flex flex-wrap items-center gap-1.5 sm:gap-2 p-2.5 sm:p-3 rounded-2xl transition-all duration-300 border-2 border-transparent bg-white/60" style="box-shadow:0 2px 8px rgba(0,0,0,0.04)">
        <span id="team-b-name" class="text-xs sm:text-sm font-extrabold text-gray-500 uppercase tracking-wider min-w-0 truncate">Equipo B</span>
        <div id="team-b-indicator" class="hidden w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(5,150,105,0.5)]"></div>
        <span id="score-b" class="text-2xl sm:text-3xl font-black text-gray-900 ml-auto tabular-nums min-w-[3rem] text-right">0</span>
        <div class="flex gap-1 ml-1">
          <button class="btn-float text-emerald-600 bg-emerald-50 border-emerald-200 hover:bg-emerald-100" data-team="b" data-pts="100">+100</button>
          <button class="btn-float text-emerald-600 bg-emerald-50 border-emerald-200 hover:bg-emerald-100" data-team="b" data-pts="200">+200</button>
          <button class="btn-float text-rose-500 bg-rose-50 border-rose-200 hover:bg-rose-100" data-team="b" data-pts="-100">−100</button>
          <button class="btn-float text-rose-500 bg-rose-50 border-rose-200 hover:bg-rose-100" data-team="b" data-pts="-200">−200</button>
        </div>
      </div>

    </div>
  </header>

  <!-- ===== BOARD AREA ===== -->
  <main class="flex-1 flex flex-col items-center px-4 sm:px-6 py-6 sm:py-10 max-w-4xl mx-auto w-full">
    
    <!-- Title -->
    <div class="text-center mb-6 sm:mb-8">
      <h1 class="text-xl sm:text-2xl font-black text-gray-900 tracking-tight">
        Quiz <span class="text-violet-600">Bíblico</span>
      </h1>
      <p class="text-xs sm:text-sm font-semibold text-gray-400 mt-1 uppercase tracking-wider">1 Juan 2 · 25 preguntas</p>
    </div>

    <!-- 5x5 Grid -->
    <div id="board" class="grid grid-cols-5 gap-3 sm:gap-4 w-full max-w-xl mx-auto mb-6"></div>

    <!-- Progress & Reset -->
    <div class="flex items-center justify-center gap-3 flex-wrap">
      <div id="progress-chip" class="text-xs font-bold text-gray-400 bg-white/80 rounded-full px-4 py-2 border border-gray-100 shadow-sm">
        0 / 25 respondidas
      </div>
      <button id="btn-reset" class="text-xs font-bold text-gray-400 bg-white/80 rounded-full px-4 py-2 border border-gray-100 shadow-sm hover:bg-rose-50 hover:text-rose-500 hover:border-rose-200 transition-all duration-200">
        ↺ Reiniciar
      </button>
    </div>

    <!-- Sudden Death Button (hidden by default) -->
    <div id="sudden-death-area" class="hidden mt-8 text-center">
      <button id="btn-desempate" class="relative inline-flex items-center gap-3 px-10 py-5 rounded-3xl font-black text-2xl sm:text-3xl text-amber-900 bg-gradient-to-br from-amber-300 to-amber-500 border-2 border-amber-400 shadow-2xl animate-[pulseGold_2s_ease-in-out_infinite] hover:scale-105 transition-transform duration-300" style="box-shadow:0 0 40px rgba(245,158,11,0.3)">
        <span class="text-3xl">🏆</span> ¡DESEMPATE!
      </button>
    </div>

  </main>
</div>


<!-- ===== MODAL OVERLAY ===== -->
<div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="modal-backdrop" id="modal-backdrop"></div>
  <div id="modal-container" class="relative z-50 w-full max-w-lg max-h-[90vh] overflow-y-auto bg-white rounded-3xl shadow-2xl border border-gray-100 p-6 sm:p-8 animate-[fadeUp_0.35s_var(--ease-bounce)]">
    
    <!-- Dynamic content injected here -->
    <div id="modal-body"></div>

  </div>
</div>


<script>
// ═══════════════════════════════════════════════════════════════
//  QUESTIONS — 1 Juan 2 (25 items)
// ═══════════════════════════════════════════════════════════════
const RAW_QUESTIONS = [
  {"id":1,"q":"¿Cuál es la perfecta regla de Dios para Su pueblo expresada en la primera carta de Juan?","o":["A) Que pequéis lo menos que podáis a lo largo de la vida.","B) Os escribo estas cosas para que no pequéis.","C) Que no os preocupéis por las faltas porque ya fuisteis salvos."],"correct":"B","exp":"Dios es santo y perfecto; por lo tanto, Su norma no puede tolerar el pecado ni en el más mínimo grado. No dice 'pequen lo menos posible', sino que establece el estándar de la perfección moral."},
  {"id":2,"q":"Un hermano de la iglesia comete una falta grave y cae en un desánimo tan profundo que piensa que Dios ha dejado de ser su Padre. ¿Qué verdad fundamental sobre su nueva naturaleza ha olvidado?","o":["A) Que debe volver a nacer de nuevo en el espíritu para recuperar su salvación.","B) Que es necesario pasar por un tiempo de disciplina oficial antes de volver a llamarse hijo.","C) Que el pecado quebranta la comunión con Dios, pero el nacimiento espiritual no se puede deshacer; la relación de padre e hijo permanece.","D) Que si un hijo deshonra a sus padres biológicos en la tierra, automáticamente deja de ser su hijo de sangre."],"correct":"C","exp":"Cuando una persona nace de nuevo, la relación biológica espiritual con Dios queda sellada para siempre. El pecado interrumpe la armonía y la comunión diaria, pero jamás destruye la identidad de hijo."},
  {"id":3,"q":"La función de Jesucristo como nuestro 'Abogado' ante el Padre consiste en convencer a Dios de que el pecado que cometimos en realidad no fue tan malo.","o":["A) Verdadero","B) Falso"],"correct":"B","exp":"Es falso porque el trabajo del Abogado no es minimizar el pecado. Su función es acudir en nuestra ayuda en el momento del fracaso, defendiéndonos frente a las acusaciones al señalar Su propia obra consumada en el Calvario y guiándonos hacia la confesión genuina."},
  {"id":4,"q":"¿Qué significa que Jesucristo es la 'propiciación' por nuestras faltas?","o":["A) Que es un intermediario que pide lástima y clemencia sin haber pagado el precio real de la culpa.","B) Que pagó completamente por nosotros, satisfaciendo las demandas de la justicia divina y eliminando toda barrera para restaurar la comunión.","C) Que reduce el castigo de forma progresiva a medida que sumamos buenas acciones en la iglesia."],"correct":"B","exp":"Al morir en la cruz, Cristo cumplió con lo que exigía la justicia de Dios contra el pecado. Pagó la deuda con Su propio sacrificio, lo que permite que Dios nos muestre misericordia de forma justa."},
  {"id":5,"q":"Durante un evangelismo, una persona afirma: 'Si la muerte de Jesús es suficiente para todo el mundo, entonces toda la humanidad ya es salva de forma automática'. ¿Cuál es la respuesta correcta para aclarar este argumento?","o":["A) Su obra es suficiente en valor para salvar a todos los hombres, pero solo es eficiente (efectiva) en aquellos que realmente ponen su confianza en Él.","B) Sí, toda la humanidad es salva automáticamente desde el momento en que se consumó el sacrificio en la cruz.","C) El sacrificio en realidad no es suficiente para todos, sino únicamente para un grupo selecto determinado desde el principio."],"correct":"A","exp":"El valor del sacrificio de Cristo no tiene límites y por eso el evangelio se ofrece a todo el mundo sin distinción; sin embargo, ese beneficio solo se activa y se hace efectivo cuando el individuo decide creer y confiar personalmente en el Salvador."},
  {"id":6,"q":"En el grupo de jóvenes, alguien afirma tener un conocimiento espiritual superior y muy profundo, pero en el día a día muestra un total desinterés por obedecer los mandamientos del Señor. ¿Cómo se califica espiritualmente a una persona con esta actitud?","o":["A) Como un maestro incomprendido que expresa su fe con un estilo de vida diferente.","B) Como un creyente inmaduro al que simplemente hay que tenerle paciencia.","C) Es mentiroso, y la verdad no está en él."],"correct":"C","exp":"Pretender tener una relación íntima o un conocimiento avanzado de Dios mientras se vive en desobediencia abierta es una contradicción absoluta. La verdadera comunión se evidencia en el deseo de hacer Su voluntad."},
  {"id":7,"q":"¿Cuál es el orden de la triple progresión de la obediencia que caracteriza la vida de un creyente?","o":["A) Estudiar teología avanzada, debatir con sectas y liderar ministerios grandes.","B) Guardar sus mandamientos, guardar Su palabra, y andar como Él anduvo.","C) Entregar ofrendas, apartar los diezmos y asistir puntualmente a todas las reuniones."],"correct":"B","exp":"Existe un avance claro: primero se obedecen los mandamientos explícitos escritos; luego se avanza a cuidar Su palabra por el deseo profundo de agradarle en todo; y finalmente se llega a la meta más alta, que es imitar por completo el estilo de vida de Jesús."},
  {"id":8,"q":"Cuando se afirma que 'el amor de Dios se ha perfeccionado' en la vida de alguien, ¿a qué tipo de amor se está haciendo referencia?","o":["A) Al amor de Dios hacia nosotros, el cual alcanza su meta y objetivo al producir frutos de obediencia.","B) Al amor humano hacia Dios, que se vuelve impecable, místico y libre de cualquier distracción.","C) Al amor afectivo y emocional que debemos sentir de forma natural por toda la sociedad mundana."],"correct":"A","exp":"No se trata de la imperfección de nuestro amor hacia Él, sino de que el amor que Dios nos demostró cumple su propósito final cuando logra transformar nuestro corazón y nos lleva a obedecerle voluntariamente."},
  {"id":9,"q":"Una hermana se siente muy frustrada porque intenta imitar la vida de Jesucristo basándose únicamente en su propia fuerza de voluntad y siempre termina fallando. ¿Cuál es la pauta correcta para solucionar esto?","o":["A) Comprender que esa norma era exclusiva para los apóstoles y que es normal bajar el estándar.","B) Esforzarse el doble, hacer ayunos extremos y realizar votos de sacrificio personal.","C) Rendir la vida sin reservas al Espíritu Santo y permitir que Cristo viva Su vida en y por medio de nosotros."],"correct":"C","exp":"Vivir como Jesús vivió es humanamente imposible con recursos propios. La responsabilidad del cristiano es consagrarse por completo y dejar que el Espíritu Santo opere y manifieste la vida de Cristo a través de sus acciones."},
  {"id":10,"q":"¿Qué diferencia práctica existe entre 'guardar los mandamientos' y la etapa superior de 'guardar Su palabra'?","o":["A) Memorizar capítulos enteros de las Escrituras para no equivocarse al hablar en público.","B) Estudiar a fondo los idiomas originales de la Biblia como el griego antiguo y el hebreo.","C) Seguir estrictamente las costumbres históricas y tradiciones de la iglesia local.","D) No limitarse a cumplir solo lo que está explícitamente escrito, sino buscar activamente hacer aquello que sabemos que le causa agrado al Señor."],"correct":"D","exp":"Guardar los mandamientos es la obediencia básica a las reglas escritas. Guardar Su palabra implica una sintonía de amor tan profunda que el creyente busca complacer el corazón de Dios incluso en los detalles que no son un mandato directo."},
  {"id":11,"q":"¿Por qué el mandamiento de amarse los unos a los otros es calificado como un mandamiento 'antiguo'?","o":["A) Porque el Señor Jesús lo enseñó y lo enfatizó a Sus discípulos desde el comienzo mismo de Su ministerio terrenal.","B) Porque formaba parte de los tratados morales escritos por los antiguos filósofos de Grecia.","C) Porque se trata de una instrucción que deben aplicar únicamente los líderes de mayor edad en la congregación."],"correct":"A","exp":"No es una innovación de último minuto ni una doctrina extraña; los creyentes conocían esta exigencia del amor mutuo desde el primer instante en que escucharon el mensaje de Cristo."},
  {"id":12,"q":"El mandamiento del amor se convirtió en algo 'nuevo' porque Cristo no solo lo enseñó de forma teórica, sino que dio un ejemplo viviente de él, y ahora ese amor se encarna en la vida de los creyentes.","o":["A) Verdadero","B) Falso"],"correct":"A","exp":"Es verdadero porque antes de Jesús el mundo no había visto un amor tan perfecto y sacrificial. Ahora es nuevo porque no es solo un ideal externo, sino una realidad que los cristianos (que antes vivían en odios y pasiones) experimentan y reflejan en la iglesia."},
  {"id":13,"q":"Un líder de la iglesia critica, menosprecia y aborrece de forma constante a los hermanos de otros departamentos argumentando que lo hace por 'celo doctrinal' y defensa de la verdad. ¿Cuál es su situación espiritual real?","o":["A) Es un creyente muy maduro y firme, aunque con un temperamento difícil de tratar.","B) Está todavía en tinieblas y anda en tinieblas; se comporta como un inconverso.","C) Es un hermano espiritual que está pasando por una prueba severa de paciencia."],"correct":"B","exp":"El aborrecimiento hacia los hermanos en la fe es una señal inequívoca de que la luz de Cristo no habita en esa persona. El diagnóstico no es una simple recaída o mal carácter; es una evidencia de que sigue en su estado original de ceguera espiritual."},
  {"id":14,"q":"¿Qué dos grandes consecuencias e impactos produce en la vida de un cristiano el hecho de amar activamente a su hermano?","o":["A) Recibe el aplauso unánime de la congregación y se le garantiza el éxito financiero en sus proyectos.","B) Queda blindado de forma automática contra cualquier tipo de crítica, persecución o insulto del mundo exterior.","C) Permanece en la luz, y en él no hay tropiezo, lo que significa que ni corre peligro de caer, ni hace que otros tropiecen."],"correct":"C","exp":"Vivir en amor fraternal alumbra el propio camino del creyente evitando que tropiece por el egoísmo. Además, al haber coherencia entre lo que profesa y lo que hace, se convierte en un testimonio limpio que no causa tropiezo a los demás."},
  {"id":15,"q":"Cuando en la comunidad cristiana surgen debates provocados por maestros que presumen de tener 'nuevas luces intelectuales' o revelaciones modernas, ¿cuál es la instrucción para discernir lo verdadero?","o":["A) Volver al principio y evaluar todo bajo las enseñanzas originales de Jesucristo.","B) Buscar corrientes teológicas aún más novedosas para mantenerse actualizados con los tiempos.","C) Someter el asunto a una votación democrática para seguir la opinión de la mayoría de la congregación."],"correct":"A","exp":"La seguridad frente al error consiste en aferrarse a la verdad fundacional recibida desde el principio. Si una enseñanza contradice o añade cosas ajenas al mensaje original de Cristo y los apóstoles, debe ser rechazada de inmediato."},
  {"id":16,"q":"Al abarcar a todos los miembros de la familia de Dios bajo la expresión general de 'hijitos', ¿cuál es la bendición común que define a todo el grupo?","o":["A) Que cuentan con muy pocos meses de experiencia tras haber conocido el evangelio.","B) Que todavía no tienen la capacidad de comprender los aspectos más profundos de la doctrina bíblica.","C) Que sus pecados les han sido completamente perdonados por causa de Su nombre."],"correct":"C","exp":"En este uso específico, la palabra no denota inmadurez o infancia espiritual, sino la condición legal y gloriosa de todos los que pertenecen a la familia de Dios: la total remisión de sus pecados gracias a los méritos de Cristo."},
  {"id":17,"q":"Un grupo de personas en la congregación resalta por su fuerza espiritual, su vigor para el servicio, su capacidad para resistir los ataques del enemigo y su constante firmeza en la batalla del día a día. ¿A qué etapa de desarrollo corresponden?","o":["A) A los jóvenes, que se caracterizan por la fuerza y por haber vencido al maligno.","B) A los hijitos en el sentido exclusivo de ser bebés recién nacidos en la fe.","C) A los padres espirituales que ya han cumplido sus metas y buscan el reposo de las actividades."],"correct":"A","exp":"Los 'jóvenes' espirituales representan el periodo de conflicto, resistencia y victoria sobre las tentaciones del diablo. Han aprendido el secreto de vencer mediante la fortaleza que el Señor les otorga."},

// Parse questions: convert option strings to {key, text} and correct letter to index
const QUESTIONS = RAW_QUESTIONS.map(q => ({
  ...q,
  choices: q.o.map(opt => ({ key: opt[0], text: opt.substring(3).trim() })),
  correctIdx: q.correct.charCodeAt(0) - 65
}));

// ═══════════════════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function getAudioCtx() {
  if (!window._aCtx) window._aCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (window._aCtx.state === 'suspended') window._aCtx.resume();
  return window._aCtx;
}

function playSound(type) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.1);
      gain.gain.setValueAtTime(0, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.5);
    } else {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(150, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(90, ctx.currentTime + 0.3);
      gain.gain.setValueAtTime(0, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.4);
    }
  } catch(e) { /* silent */ }
}

//  SCOREBOARD

function renderScores() {
  dom.scoreA.textContent = state.scores.A;
  dom.scoreB.textContent = state.scores.B;
}

function addScore(team, delta) {
  state.scores[team] = clamp(state.scores[team] + delta, 0, 9999);
  renderScores();
  const el = team === 'A' ? dom.scoreA : dom.scoreB;
  el.classList.remove('score-pop');
  void el.offsetWidth;
  el.classList.add('score-pop');
}

function updateTurnUI() {
  const t = state.currentTeam;
  const isA = t === 'A';
  dom.panelA.className = `team-turn flex-1 flex flex-wrap items-center gap-1.5 sm:gap-2 p-2.5 sm:p-3 rounded-2xl transition-all duration-300 border-2 ${isA ? 'border-violet-300 bg-violet-50/70' : 'border-transparent bg-white/60'}`;
  dom.panelB.className = `team-turn flex-1 flex flex-wrap items-center gap-1.5 sm:gap-2 p-2.5 sm:p-3 rounded-2xl transition-all duration-300 border-2 ${!isA ? 'border-emerald-300 bg-emerald-50/70' : 'border-transparent bg-white/60'}`;
  dom.indA.style.display = isA ? 'block' : 'none';
  dom.indB.style.display = !isA ? 'block' : 'none';
  dom.turnBadge.textContent = `Turno ${t}`;
  dom.turnBadge.className = `text-[0.55rem] font-black uppercase tracking-wider px-2 py-1 rounded-full ${isA ? 'bg-violet-100 text-violet-700' : 'bg-emerald-100 text-emerald-700'}`;
}

// ═══════════════════════════════════════════════════════════════
//  SLOT SYSTEM (Deterministic Architecture)
// ═══════════════════════════════════════════════════════════════
function buildSlots() {
  const shuffled = shuffle(QUESTIONS);
  state.slots = Array.from({ length: 25 }, (_, i) => ({
    slotId: i + 1,
    question: shuffled[i],
    isSolved: false
  }));
}

function renderBoard() {
  const solved = state.slots.filter(s => s.isSolved).length;
  state.answeredCount = solved;
  dom.progress.textContent = `${solved} / 25 respondidas`;

  dom.board.innerHTML = state.slots.map(slot => {
    const shadows = SHADOWS;
    const shadowIdx = (slot.slotId - 1) % 3;
    const floatDur = (2.5 + (slot.slotId % 5) * 0.3).toFixed(1);
    const floatDelay = ((slot.slotId * 0.17) % 3).toFixed(2);
    const isSolved = slot.isSolved;
    return `<button
      data-slot-id="${slot.slotId}"
      class="slot-card flex flex-col items-center justify-center aspect-square text-center p-2 ${isSolved ? 'solved' : shadows[shadowIdx] + ' hover:' + (slot.slotId % 2 === 0 ? 'shadow-2xl' : 'shadow-xl')}"
      style="${isSolved ? '' : `--float-dur:${floatDur}s;--float-delay:${floatDelay}s;--hover-color:${slot.slotId % 2 === 0 ? '#7C3AED' : '#059669'}`}"
      onclick="handleSlotClick(${slot.slotId})"
      ${isSolved ? 'disabled' : ''}>
      <span class="text-xl sm:text-2xl font-black text-gray-800 leading-none ${isSolved ? 'text-gray-300' : ''}">${slot.slotId}</span>
      ${isSolved ? '<span class="text-[0.5rem] mt-0.5 text-gray-300 font-bold">✓</span>' : '<span class="text-[0.5rem] mt-0.5 text-gray-300 font-semibold">●</span>'}
    </button>`;
  }).join('');

  checkSuddenDeath();
}

// ═══════════════════════════════════════════════════════════════
//  GAME FLOW
// ═══════════════════════════════════════════════════════════════
function handleSlotClick(slotId) {
  if (state.gameOver) return;
  const slot = state.slots.find(s => s.slotId === slotId);
  if (!slot || slot.isSolved) return;

  state.currentSlotId = slotId;
  state.currentQuestion = slot.question;
  state.isRevealed = false;
  stopTimer();
  showBettingScreen();
}

// ─── PHASE 1: BETTING ──────────────────────────────────────────

// ─── PHASE 2: QUESTION (options hidden, timer hidden) ───────────
function selectBet(amount) {
  state.currentBet = amount;
  state.phase = 'answering';
  state.isRevealed = false;
  stopTimer();
  state.timer = TIMER_SECONDS;

  const q = state.currentQuestion;
  const t = state.currentTeam;
  const accent = ACCENTS[t];

  dom.modalBody.innerHTML = `
    <div class="text-center mb-5">
      <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full ${accent.bg} ${accent.text} text-xs font-black uppercase tracking-wider mb-3">
        Apuesta: ${amount === 100 ? 'Estándar (100 pts)' : '¡Doble o Nada! (200 pts)'}
      </div>
      <p class="text-base sm:text-lg font-bold text-gray-800 leading-relaxed">${q.q}</p>
    </div>
    <div class="flex flex-col items-center gap-4">
      <button id="btn-reveal" class="inline-flex items-center gap-2 px-8 py-4 rounded-2xl font-black text-sm text-white bg-gradient-to-r from-violet-600 to-violet-500 shadow-lg shadow-violet-200 hover:shadow-xl hover:shadow-violet-200 hover:from-violet-500 hover:to-violet-400 transition-all duration-200 active:scale-95" onclick="revealOptions()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        Revelar Opciones
      </button>

    <div id="timer-area" class="hidden flex flex-col items-center mt-4">
      <div class="relative w-20 h-20">
        <svg viewBox="0 0 94 94" class="absolute inset-0 transform -rotate-90">
          <circle class="timer-ring" cx="47" cy="47" r="42" stroke="#e5e7eb"/>
          <circle id="timer-ring-prog" class="timer-ring" cx="47" cy="47" r="42" stroke="${COLORS[t]}" stroke-dasharray="${CIRCUMFERENCE}" stroke-dashoffset="0" style="transition:stroke-dashoffset 1s linear"/>
        </svg>
        <span id="timer-text" class="absolute inset-0 flex items-center justify-center text-2xl font-black text-gray-800">${TIMER_SECONDS}</span>

// ─── PHASE 3: TIMER START + OPTIONS REVEALED ───────────────────
function revealOptions() {
  if (state.isRevealed) return;
  state.isRevealed = true;
  state.phase = 'revealed';

  const q = state.currentQuestion;
  const t = state.currentTeam;
  const accent = ACCENTS[t];

  const timerArea = document.getElementById('timer-area');
  const optionsArea = document.getElementById('options-area');
  const revealBtn = document.getElementById('btn-reveal');

  if (revealBtn) revealBtn.style.display = 'none';
  if (timerArea) timerArea.classList.remove('hidden');
  if (optionsArea) {
    optionsArea.classList.remove('hidden');
    optionsArea.innerHTML = q.choices.map((c, i) =>
      `<button class="btn-opt" onclick="handleAnswer(${i})">
        <span class="opt-letter" style="color:${COLORS[t]}">${c.key})</span> ${c.text}
      </button>`
    ).join('');
  }

  startTimer();
}

// ─── PHASE 4: ANSWER SELECTED ──────────────────────────────────
function handleAnswer(idx) {
  if (state.phase === 'result') return;
  stopTimer();

  const q = state.currentQuestion;
  const isCorrect = idx === q.correctIdx;
  const t = state.currentTeam;

  playSound(isCorrect ? 'correct' : 'wrong');

  // Highlight options
  document.querySelectorAll('.btn-opt').forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correctIdx) btn.classList.add('opt-correct');
    else if (i === idx) btn.classList.add('opt-wrong');
  });

  state.phase = 'result';

  setTimeout(() => showResult(isCorrect), 600);
}

function showResult(isCorrect) {
  const q = state.currentQuestion;
  const t = state.currentTeam;
  const bet = state.currentBet;
  const accent = ACCENTS[t];
  const points = isCorrect ? bet : 0;

  // Update score
  if (isCorrect) addScore(t, bet);

  // Mark slot as solved
  const slot = state.slots.find(s => s.slotId === state.currentSlotId);
  if (slot) slot.isSolved = true;

  const correctKey = q.choices[q.correctIdx].key;
  const correctText = q.choices[q.correctIdx].text;

  dom.modalBody.innerHTML = `
    <div class="text-center mb-5 animate-[slideDown_0.4s_var(--ease-bounce)]">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full text-3xl mx-auto mb-3 ${isCorrect ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-500'}">
        ${isCorrect ? '✓' : '✗'}
      </div>
      <h2 class="text-2xl font-black ${isCorrect ? 'text-emerald-700' : 'text-rose-600'}">${isCorrect ? '¡Respuesta Correcta!' : 'Respuesta Incorrecta'}</h2>
      <p class="text-sm font-bold text-gray-400 mt-1">
        ${t === 'A' ? dom.teamA.textContent : dom.teamB.textContent} 
        <span class="${isCorrect ? 'text-emerald-600' : 'text-rose-500'}">${isCorrect ? '+' + points : '+0'}</span> pts
      </p>
    </div>
    <div class="bg-gray-50 rounded-2xl p-5 mb-5 border border-gray-100 animate-[fadeUp_0.5s_var(--ease-bounce)]">
      <div class="text-xs font-black text-gray-400 uppercase tracking-wider mb-2">Respuesta correcta</div>
      <p class="text-base font-bold text-gray-800"><span class="text-violet-600">${correctKey})</span> ${correctText}</p>
    </div>
    <div class="bg-amber-50 rounded-2xl p-5 border border-amber-100 animate-[fadeUp_0.6s_var(--ease-bounce)]" style="animation-delay:0.1s">
      <div class="flex items-center gap-2 mb-2">
        <span class="text-lg">📖</span>
        <span class="text-xs font-black text-amber-700 uppercase tracking-wider">Explicación</span>
      </div>
      <p class="text-sm font-semibold text-amber-900 leading-relaxed">${q.exp}</p>
    </div>
    <button class="mt-6 w-full py-4 rounded-2xl font-black text-sm text-white hover:opacity-90 transition-all duration-200 active:scale-95 shadow-lg" style="background:${COLORS[t]}" onclick="continueGame()">
      Continuar →
    </button>
  `;
  showModal();
}

function continueGame() {
  closeModal();
  state.currentSlotId = null;
  state.currentQuestion = null;
  state.currentBet = 0;
  state.isRevealed = false;

  // Switch team
  state.currentTeam = state.currentTeam === 'A' ? 'B' : 'A';
  updateTurnUI();
  renderBoard();
  renderScores();
  state.phase = 'idle';
}

//  TIMER
// ═══════════════════════════════════════════════════════════════
function startTimer() {
  stopTimer();
  state.timer = TIMER_SECONDS;
  updateTimerUI(TIMER_SECONDS);

  state.timerInterval = setInterval(() => {
    state.timer--;
    updateTimerUI(state.timer);
    if (state.timer <= 5) {
      const ring = document.getElementById('timer-ring-prog');
      const txt = document.getElementById('timer-text');
      if (ring) ring.style.stroke = '#ef4444';
      if (txt) txt.style.color = '#ef4444';
    }
    if (state.timer <= 0) {
      stopTimer();
      handleTimeout();
    }
  }, 1000);
}

function stopTimer() {
  if (state.timerInterval) {
    clearInterval(state.timerInterval);
    state.timerInterval = null;
  }
}

function updateTimerUI(seconds) {
  const ring = document.getElementById('timer-ring-prog');
  const txt = document.getElementById('timer-text');
  if (ring) ring.style.strokeDashoffset = CIRCUMFERENCE - (seconds / TIMER_SECONDS) * CIRCUMFERENCE;
  if (txt) txt.textContent = seconds;
}

function handleTimeout() {
  if (state.phase === 'result') return;
  // Treat as wrong answer
  document.querySelectorAll('.btn-opt').forEach(btn => btn.disabled = true);
  showResult(false);
}

// ═══════════════════════════════════════════════════════════════
//  SUDDEN DEATH
// ═══════════════════════════════════════════════════════════════
function checkSuddenDeath() {
  const solved = state.slots.filter(s => s.isSolved).length;
  const tie = state.scores.A === state.scores.B;
  if (solved === 25 && tie && !state.gameOver) {
    state.gameOver = true;
    dom.suddenDeathArea.classList.remove('hidden');
    dom.suddenDeathArea.querySelector('#btn-desempate').classList.add('animate-[pulseGold_2s_ease-in-out_infinite]');
  } else if (solved === 25 && !tie) {
    showWinner();
  } else {
    dom.suddenDeathArea.classList.add('hidden');
  }
}

function startSuddenDeath() {
  const q = shuffle(QUESTIONS)[0];
  const t = state.currentTeam;
  const accent = ACCENTS[t];

  dom.modalBody.innerHTML = `
    <div class="text-center mb-5 animate-[slideDown_0.4s_var(--ease-bounce)]">
      <div class="text-5xl mb-3">🏆</div>
      <h2 class="text-2xl font-black text-amber-700">¡Muerte Súbita!</h2>
      <p class="text-sm font-bold text-amber-600 mt-1">Los equipos están empatados. Esta pregunta decide al ganador.</p>
    </div>
    <div class="bg-gray-50 rounded-2xl p-5 mb-5 border border-gray-100">
      <p class="text-base font-bold text-gray-800 leading-relaxed">${q.q}</p>
    </div>
    <div class="space-y-2.5 mb-6">
      ${q.choices.map((c, i) =>
        `<button class="btn-opt" onclick="handleSuddenDeathAnswer(${i}, ${q.correctIdx}, '${q.exp.replace(/'/g, "\\'").replace(/"/g, '&quot;')}')">
          <span class="opt-letter text-amber-600">${c.key})</span> ${c.text}
        </button>`
      ).join('')}
    </div>
  `;
  closeModal();
  dom.suddenDeathArea.classList.add('hidden');
  // Store the SD question
  state._sdQuestion = q;
  state._sdTeam = null;
  showModal();
}

function handleSuddenDeathAnswer(idx, correctIdx, exp) {
  stopTimer();
  const q = state._sdQuestion;
  const isCorrect = idx === correctIdx;

  document.querySelectorAll('.btn-opt').forEach((btn, i) => {
    btn.disabled = true;
    if (i === correctIdx) btn.classList.add('opt-correct');
    else if (i === idx) btn.classList.add('opt-wrong');
  });

  setTimeout(() => {
    const winnerTeam = isCorrect ? state.currentTeam : (state.currentTeam === 'A' ? 'B' : 'A');
    const winnerName = winnerTeam === 'A' ? dom.teamA.textContent : dom.teamB.textContent;
    const loserName = winnerTeam === 'A' ? dom.teamB.textContent : dom.teamA.textContent;
    const correctKey = q.choices[correctIdx].key;
    const correctText = q.choices[correctIdx].text;

    dom.modalBody.innerHTML = `
      <div class="text-center mb-5 animate-[slideDown_0.4s_var(--ease-bounce)]">
        <div class="text-6xl mb-3">🏆</div>
        <h2 class="text-3xl font-black text-amber-700">¡${winnerName} Gana!</h2>
        <p class="text-sm font-bold text-gray-400 mt-1">${isCorrect ? 'Respuesta correcta' : 'Respuesta incorrecta — ' + loserName + ' gana por defecto'}</p>
      </div>
      <div class="bg-gray-50 rounded-2xl p-5 mb-4 border border-gray-100">
        <div class="text-xs font-black text-gray-400 uppercase tracking-wider mb-2">Respuesta correcta</div>
        <p class="text-base font-bold text-gray-800"><span class="text-violet-600">${correctKey})</span> ${correctText}</p>
      </div>
      <div class="bg-amber-50 rounded-2xl p-5 border border-amber-100">
        <div class="flex items-center gap-2 mb-2">
          <span class="text-lg">📖</span>
          <span class="text-xs font-black text-amber-700 uppercase tracking-wider">Explicación</span>
        </div>
        <p class="text-sm font-semibold text-amber-900 leading-relaxed">${exp}</p>
      </div>
      <button class="mt-6 w-full py-4 rounded-2xl font-black text-sm text-white bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-600 hover:to-amber-700 transition-all duration-200 active:scale-95 shadow-lg shadow-amber-200" onclick="resetGame()">
        ↺ Jugar de Nuevo
      </button>
    `;
    showModal();
    state.gameOver = true;
  }, 600);
}

function showWinner() {
  const winner = state.scores.A > state.scores.B ? 'A' : 'B';
  const winnerName = winner === 'A' ? dom.teamA.textContent : dom.teamB.textContent;
  const score = state.scores[winner];

  dom.modalBody.innerHTML = `
    <div class="text-center mb-5 animate-[slideDown_0.4s_var(--ease-bounce)]">
      <div class="text-6xl mb-3">🏆</div>
      <h2 class="text-3xl font-black text-gray-900">¡${winnerName} Campeón!</h2>
      <p class="text-sm font-bold text-gray-400 mt-1">Puntaje final: ${score} pts</p>
    </div>
    <div class="bg-gray-50 rounded-2xl p-5 mb-5 border border-gray-100 text-center">
      <p class="text-sm font-semibold text-gray-600">¡Gracias por estudiar 1 Juan 2!</p>
    </div>
    <button class="w-full py-4 rounded-2xl font-black text-sm text-white bg-gradient-to-r from-violet-600 to-indigo-600 hover:from-violet-500 hover:to-indigo-500 transition-all duration-200 active:scale-95 shadow-lg shadow-violet-200" onclick="resetGame()">
      ↺ Jugar de Nuevo
    </button>
  `;
  state.gameOver = true;
  showModal();
}

// ═══════════════════════════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════════════════════════
function showModal() {
  dom.modal.classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  dom.modal.classList.add('hidden');
  document.body.style.overflow = '';
}

// ═══════════════════════════════════════════════════════════════
//  RESET
// ═══════════════════════════════════════════════════════════════
function resetGame() {
  stopTimer();
  closeModal();
  state.scores = { A: 0, B: 0 };
  state.currentTeam = 'A';
  state.currentSlotId = null;
  state.currentQuestion = null;
  state.currentBet = 0;
  state.phase = 'idle';
  state.gameOver = false;
  state.isSuddenDeath = false;
  state.isRevealed = false;
  state.timer = TIMER_SECONDS;
  state.answeredCount = 0;
  state._sdQuestion = null;
  state._sdTeam = null;
  dom.suddenDeathArea.classList.add('hidden');
  buildSlots();
  renderBoard();
  renderScores();
  updateTurnUI();
  dom.progress.textContent = `0 / 25 respondidas`;
}

// ═══════════════════════════════════════════════════════════════
//  WIRING
// ═══════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  // Manual score buttons
  document.querySelectorAll('[data-team]').forEach(btn => {
    btn.addEventListener('click', () => {
      const team = btn.dataset.team.toUpperCase();
      const pts = parseInt(btn.dataset.pts);
      addScore(team, pts);
    });
  });

  // Reset
  dom.btnReset.addEventListener('click', () => {
    if (confirm('¿Reiniciar el juego? Se perderán todos los puntajes.')) resetGame();
  });

  // Sudden death
  dom.btnDesempate.addEventListener('click', startSuddenDeath);

  // Close modal on backdrop click
  dom.backdrop.addEventListener('click', () => {
    if (state.phase === 'betting') closeModal();
  });

  // Close modal on Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && state.phase === 'betting' && !dom.modal.classList.contains('hidden')) closeModal();
  });

  // Init
  buildSlots();
  renderBoard();
  renderScores();
  updateTurnUI();
});

// Expose for inline onclick
window.handleSlotClick = handleSlotClick;
window.selectBet = selectBet;
window.revealOptions = revealOptions;
window.handleAnswer = handleAnswer;
window.continueGame = continueGame;
window.closeModal = closeModal;
window.startSuddenDeath = startSuddenDeath;
window.handleSuddenDeathAnswer = handleSuddenDeathAnswer;
window.resetGame = resetGame;
</script>
</body>
</html>
